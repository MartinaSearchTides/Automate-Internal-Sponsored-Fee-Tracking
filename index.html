<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow">
<title>SearchTides - Internal Sponsored Fee Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #f5f4f0;
  --surface:  #ffffff;
  --surface2: #f9f8f5;
  --surface3: #eeecea;
  --border:   rgba(0,0,0,0.08);
  --border2:  rgba(0,0,0,0.14);
  --text:     #1a1916;
  --muted:    #888580;
  --muted2:   #5a5754;
  --purple:       #5b4de0;
  --purple-light: #7c6af5;
  --purple-dim:   rgba(91,77,224,0.08);
  --purple-bdr:   rgba(91,77,224,0.22);
  --teal:       #0e9e80;
  --teal-light: #12b894;
  --teal-dim:   rgba(14,158,128,0.08);
  --teal-bdr:   rgba(14,158,128,0.22);
  --amber:      #c47a1a;
  --amber-dim:  rgba(196,122,26,0.08);
  --amber-bdr:  rgba(196,122,26,0.22);
  --red:    #c0392b;
  --orange: #e07820;
  --green:  #1a8a52;
  --fd: 'Libre Baskerville', serif;
  --fs: 'Inter', sans-serif;
  --fm: 'DM Mono', monospace;
}
body { font-family: var(--fs); background: var(--bg); color: var(--text); min-height: 100vh; font-variant-numeric: tabular-nums; font-size: 14px; }

/* LOADING */
#loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1.5rem; }
.load-wordmark { font-family: var(--fd); font-size: 12px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 12px; }
.load-wordmark::before, .load-wordmark::after { content: ''; display: block; width: 32px; height: 1px; background: var(--border2); }
.load-title { font-family: var(--fd); font-size: 52px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
.load-title em { font-style: italic; color: var(--purple); font-weight: 400; }
.load-status { font-size: 12px; color: var(--muted); font-family: var(--fm); display: flex; align-items: center; gap: 8px; }
.spinner { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: var(--surface); border: 1px solid rgba(192,57,43,0.3); border-radius: 8px; padding: 1.5rem 2rem; max-width: 480px; text-align: center; }
.error-box h3 { font-family: var(--fd); font-size: 18px; color: var(--red); margin-bottom: 0.5rem; }
.error-box p { font-size: 13px; color: var(--muted2); font-family: var(--fm); margin-bottom: 1rem; }
.retry-btn { padding: 8px 20px; background: var(--purple); color: #fff; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; font-family: var(--fs); cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; }

/* DASHBOARD */
#dashboard { display: none; max-width: 1500px; margin: 0 auto; padding: 0 2rem 4rem; }
.dashboard-body { margin-top: 1.75rem; }
.topnav { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 0; border-bottom: 1px solid var(--border2); flex-wrap: wrap; gap: 1rem; }
.nav-brand { font-family: var(--fd); font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.nav-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--purple); }
.nav-brand span { color: var(--muted); font-weight: 400; font-size: 14px; font-family: var(--fs); }
.nav-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
.nav-meta { font-size: 11px; color: var(--muted); font-family: var(--fm); }
.refresh-btn { font-size: 11px; color: var(--muted2); background: var(--surface); border: 1px solid var(--border2); border-radius: 4px; padding: 6px 14px; cursor: pointer; font-family: var(--fm); display: flex; align-items: center; gap: 6px; transition: border-color 0.15s, color 0.15s; }
.refresh-btn:hover { border-color: var(--purple-bdr); color: var(--purple); }
.refresh-btn .spin-sm { width: 10px; height: 10px; border: 1.5px solid var(--border2); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
.refresh-btn.loading .spin-sm { display: block; }

.summary-bar { display: grid; grid-template-columns: repeat(5,1fr); gap: 1px; background: var(--border); border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; margin-bottom: 1.75rem; }
.sum-tile { background: var(--surface); padding: 1.1rem 1.4rem; transition: background 0.15s; }
.sum-tile:hover { background: var(--surface2); }
.sum-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; font-family: var(--fm); }
.sum-value { font-family: var(--fd); font-size: 32px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
.sv-teal    { color: var(--teal); }
.sv-purple  { color: var(--purple); }
.sv-neutral { color: var(--text); }
.sv-ok      { color: var(--green); }
.sv-warn    { color: var(--orange); }
.sv-over    { color: var(--red); }
.sv-amber   { color: var(--amber); }
.pipeline-indicator { margin-top: 6px; font-size: 10px; font-family: var(--fm); color: var(--muted); display: flex; align-items: center; gap: 5px; }
.pip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.pip-ok   { background: var(--green); }
.pip-warn { background: var(--orange); }
.pipeline-badge { background: var(--surface3); border: 1px solid var(--border2); border-radius: 5px; padding: 10px 16px; margin-top: 12px; display: flex; align-items: center; gap: 10px; }
.pipeline-badge .pip-dot { width: 10px; height: 10px; }
.pipeline-text { font-size: 13px; font-family: var(--fm); color: var(--text); font-weight: 500; }
.pipeline-status { font-weight: 600; }
.pipeline-status.covered { color: var(--green); }
.pipeline-status.not-covered { color: var(--orange); }

.summary-sponsored-wrap { margin-bottom: 1.75rem; }
.summary-sponsored-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; font-family: var(--fm);
  color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.summary-sponsored-title svg { flex-shrink: 0; }
.summary-bar.summary-sponsored { grid-template-columns: repeat(5, 1fr); }
.sponsored-footnote {
  font-size: 11px; color: var(--muted); font-family: var(--fm); margin-top: 10px; line-height: 1.45; max-width: 920px;
}
.sv-dollar { color: var(--text); }
.sum-sub { font-size: 11px; font-family: var(--fm); color: var(--muted); margin-top: 8px; font-weight: 400; letter-spacing: 0; text-transform: none; }

.sponsored-strip {
  border-top: 1px solid var(--border);
  padding: 16px 22px 18px;
  background: linear-gradient(180deg, rgba(14,158,128,0.04) 0%, var(--surface) 100%);
}
.sponsored-strip-head {
  font-size: 9px; font-weight: 600; letter-spacing: 0.13em; text-transform: uppercase; font-family: var(--fm);
  color: var(--teal); margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
}
.sponsored-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px 16px; }
.sponsored-metric-label { font-size: 10px; font-family: var(--fm); color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.sponsored-metric-val { font-family: var(--fd); font-size: 20px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
.sponsored-metric-val.em { color: var(--purple); }
.sponsored-metric-val.na { color: var(--muted); font-size: 15px; font-weight: 600; font-family: var(--fm); }

.clients-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1px; background: var(--border); border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; }

.client-card { background: var(--surface); display: flex; flex-direction: column; }
.client-card:hover { background: var(--surface2); }
.client-card:nth-child(odd)  { border-top: 3px solid var(--purple); }
.client-card:nth-child(even) { border-top: 3px solid var(--teal); }

.card-header { padding: 20px 24px 16px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); }
.client-name { font-family: var(--fd); font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
.quota-pill { font-size: 12px; font-family: var(--fm); color: var(--muted2); background: var(--surface3); border: 1px solid var(--border2); padding: 4px 10px; border-radius: 3px; white-space: nowrap; font-variant-numeric: tabular-nums; }
.quota-pill strong { color: var(--text); font-weight: 500; }
.progress-wrap { padding: 13px 24px 15px; border-bottom: 1px solid var(--border); }
.progress-labels { display: flex; justify-content: space-between; font-size: 11px; font-family: var(--fm); color: var(--muted); margin-bottom: 7px; font-variant-numeric: tabular-nums; }
.progress-pct { font-weight: 500; }
.ppc-red    { color: var(--red); }
.ppc-orange { color: var(--orange); }
.ppc-green  { color: var(--green); }
.progress-track { height: 3px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.7s cubic-bezier(0.16,1,0.3,1); }
.pf-red    { background: var(--red); }
.pf-orange { background: var(--orange); }
.pf-green  { background: var(--green); }

.funnels { display: grid; grid-template-columns: 3fr 2fr; flex: 1; }
.funnel-col { padding: 18px 22px 22px; }
.funnel-col:first-child { border-right: 1px solid var(--border); }
.funnel-heading { font-size: 9px; font-weight: 600; letter-spacing: 0.13em; text-transform: uppercase; font-family: var(--fm); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.fh-btf { color: var(--teal); }
.fh-top { color: var(--purple); }
.funnel-total { font-family: var(--fd); font-size: 42px; font-weight: 700; letter-spacing: -1.5px; line-height: 1; margin-bottom: 14px; font-variant-numeric: tabular-nums; }
.ft-btf { color: var(--teal); }
.ft-top { color: var(--purple); }
.status-list { display: flex; flex-direction: column; gap: 8px; }
.status-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.s-name { font-size: 12px; font-family: var(--fm); color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.s-name-pub { color: var(--teal); font-weight: 500; }
.s-val { font-size: 13px; font-family: var(--fm); font-weight: 500; color: var(--text); white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.s-val-pub { color: var(--teal); font-weight: 600; font-size: 15px; }

@media (max-width: 900px) {
  .clients-grid { grid-template-columns: 1fr; }
  .summary-bar  { grid-template-columns: repeat(2,1fr); }
  .summary-bar.summary-sponsored { grid-template-columns: repeat(2, 1fr); }
  .sponsored-metrics { grid-template-columns: repeat(2, 1fr); }
  .funnels      { grid-template-columns: 1fr; }
  .funnel-col:first-child { border-right: none; border-bottom: 1px solid var(--border); }
}

@media (max-width: 640px) {
  #dashboard { padding: 0 1rem 2rem; }
  .topnav { padding: 0.8rem 0; }
  .nav-brand { font-size: 15px; }
  .nav-brand span { font-size: 12px; }
  .nav-meta { font-size: 10px; }
  .refresh-btn { font-size: 10px; padding: 5px 10px; }
  .summary-bar { grid-template-columns: 1fr; }
  .summary-bar.summary-sponsored { grid-template-columns: 1fr; }
  .sponsored-metrics { grid-template-columns: 1fr; }
  .sum-tile { padding: 1rem 1.2rem; }
  .sum-label { font-size: 9px; }
  .sum-value { font-size: 26px; }
  .pipeline-indicator { font-size: 9px; }
  .card-header { padding: 16px 18px 14px; flex-wrap: wrap; gap: 8px; }
  .client-name { font-size: 19px; }
  .quota-pill { font-size: 11px; padding: 3px 8px; }
  .progress-wrap { padding: 11px 18px 13px; }
  .progress-labels { font-size: 10px; }
  .funnels { grid-template-columns: 1fr; }
  .funnel-col { padding: 14px 18px 18px; }
  .funnel-col:first-child { border-right: none; border-bottom: 1px solid var(--border); }
  .funnel-heading { font-size: 8px; }
  .funnel-total { font-size: 34px; letter-spacing: -1px; }
  .status-row { gap: 6px; }
  .s-name { font-size: 11px; }
  .s-val { font-size: 12px; }
  .s-val-pub { font-size: 14px; }
  .pipeline-badge { padding: 8px 12px; margin-top: 10px; }
  .pipeline-text { font-size: 11px; }
  .pipeline-badge .pip-dot { width: 8px; height: 8px; }
  .load-title { font-size: 36px; text-align: center; }
  .load-wordmark { font-size: 11px; }
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="load-wordmark">SearchTides</div>
  <h1 class="load-title">INTERNAL SPONSORED <em>FEE</em></h1>
  <div class="load-status" id="load-status">
    <div class="spinner"></div>
    <span id="load-text">Loading data...</span>
  </div>
</div>

<div id="dashboard">
  <div class="topnav">
    <div class="nav-brand"><div class="nav-dot"></div>SearchTides<span>/ INTERNAL SPONSORED FEE DASHBOARD</span></div>
    <div class="nav-right">
      <span class="nav-meta" id="nav-meta"></span>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
        <div class="spin-sm"></div>
        Refresh
      </button>
    </div>
  </div>
  <div class="dashboard-body">
    <div class="summary-bar" id="summary-internal"></div>
    <div class="summary-sponsored-wrap">
      <div class="summary-sponsored-title">
        <svg width="6" height="6" viewBox="0 0 6 6"><circle cx="3" cy="3" r="3" fill="var(--teal)"/></svg>
        Internal sponsored fees (BOF, priced rows only)
      </div>
      <div class="summary-bar summary-sponsored" id="summary-sponsored-internal"></div>
      <p class="sponsored-footnote" id="sponsored-footnote-internal"></p>
    </div>
    <div class="clients-grid" id="grid-internal"></div>
  </div>
</div>

<script>
var BTF = ["Published","Pending","Content Requested","Ready for Delivery","Revisions Requested"];
var TOP = ["Site Approved","Negotiation"];
var globalClients = [];
var globalSponsoredTotals = null;

function n(v) { var x = parseFloat(v); return isNaN(x) ? 0 : x; }
function fmt(v) { return Math.round(v||0).toLocaleString("en-US"); }
function fmtMoney(v) {
  if (v === null || v === undefined) return "—";
  var x = Number(v);
  if (isNaN(x)) return "—";
  return x.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
}
function fmtRatio(v) {
  if (v === null || v === undefined || isNaN(v)) return "—";
  return Number(v).toFixed(4);
}
function pct(val, total) { return total > 0 ? Math.round(val / total * 100) : 0; }
function pcClass(p) { return p < 50 ? "red" : p < 90 ? "orange" : "green"; }
function sumClass(pc) { return pc === "red" ? "sv-over" : pc === "orange" ? "sv-warn" : "sv-ok"; }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

async function loadData() {
  var btn = document.getElementById("refresh-btn");
  var loadScreen = document.getElementById("loading-screen");
  var dash = document.getElementById("dashboard");

  btn.classList.add("loading");
  document.getElementById("load-text").textContent = "Loading data...";

  try {
    var res = await fetch("/api/data?t=" + Date.now(), { cache: "no-store" });
    var raw = await res.text();
    var json = null;
    try {
      json = raw ? JSON.parse(raw) : null;
    } catch (parseErr) {
      json = null;
    }
    if (!res.ok) {
      var errMsg =
        json && json.error
          ? json.error
          : raw
            ? ("HTTP " + res.status + " — " + raw.slice(0, 400).replace(/\s+/g, " ").trim())
            : ("HTTP " + res.status + " (empty body)");
      throw new Error(errMsg);
    }
    if (!json) throw new Error("Invalid JSON from API");
    if (!json.ok) throw new Error(json.error || "Unknown error");

    globalClients = json.clients;
    globalSponsoredTotals = json.sponsored_totals || null;
    var loaded = new Date(json.generated).toLocaleTimeString("en-US");
    document.getElementById("nav-meta").textContent = json.clients.length + " clients - " + json.prod_month + " - loaded " + loaded;

    renderInternal(json.clients);

    loadScreen.style.display = "none";
    dash.style.display = "block";

  } catch(err) {
    document.getElementById("load-text").textContent = "Error: " + err.message;
    loadScreen.innerHTML =
      '<div class="load-wordmark">SearchTides</div>' +
      '<h1 class="load-title">INTERNAL SPONSORED <em>FEE</em></h1>' +
      '<div class="error-box">' +
        '<h3>Could not load data</h3>' +
        '<p>' + esc(err.message) + '</p>' +
        '<button class="retry-btn" onclick="loadData()">Retry</button>' +
      '</div>';
  } finally {
    btn.classList.remove("loading");
  }
}

function renderSponsoredSummary(totals) {
  var el = document.getElementById("summary-sponsored-internal");
  var foot = document.getElementById("sponsored-footnote-internal");
  if (!totals || !el) return;
  var eff = totals.efficiency_ratio;
  var avg = totals.avg_sponsored_fee;
  el.innerHTML =
    '<div class="sum-tile"><div class="sum-label">Efficiency ratio</div><div class="sum-value sv-purple">' + fmtRatio(eff) +
    '</div><div class="sum-sub">Σ Final $ ÷ Σ LV (priced BOF)</div></div>' +
    '<div class="sum-tile"><div class="sum-label">Avg sponsored fee</div><div class="sum-value sv-dollar">' + fmtMoney(avg) +
    '</div><div class="sum-sub">Σ Final $ ÷ link count</div></div>' +
    '<div class="sum-tile"><div class="sum-label">Priced BOF links</div><div class="sum-value sv-teal">' + fmt(totals.count) +
    '</div><div class="sum-sub">Rows with FINAL $ filled</div></div>' +
    '<div class="sum-tile"><div class="sum-label">Σ Final $</div><div class="sum-value sv-dollar">' + fmtMoney(totals.sum_final_usd) +
    '</div><div class="sum-sub">All clients, ' + esc(BTF.join(", ")) + '</div></div>' +
    '<div class="sum-tile"><div class="sum-label">Σ LV (priced)</div><div class="sum-value sv-teal">' + fmt(totals.sum_lv) +
    '</div><div class="sum-sub">Same rows as cost</div></div>';
  if (foot) {
    foot.textContent =
      "BOF statuses: " + BTF.join(", ") + ". Rows without a filled FINAL $ are excluded from these sums and counts; FINAL $ may be $0 (e.g. free placement). Internal HSS data only (HSS SeaTable OM).";
  }
}

function renderSponsoredStrip(sp) {
  if (!sp) sp = { sum_lv: 0, sum_final_usd: 0, count: 0, efficiency_ratio: null, avg_sponsored_fee: null };
  var has = sp.count > 0;
  var effCls = "sponsored-metric-val em";
  var avgCls = "sponsored-metric-val sv-dollar";
  if (!has) {
    effCls = "sponsored-metric-val na";
    avgCls = "sponsored-metric-val na";
  }
  return (
    '<div class="sponsored-strip">' +
      '<div class="sponsored-strip-head">' +
        '<svg width="6" height="6" viewBox="0 0 6 6"><circle cx="3" cy="3" r="3" fill="var(--teal)"/></svg>' +
        "Sponsored fees (priced BOF)" +
      "</div>" +
      '<div class="sponsored-metrics">' +
        '<div><div class="sponsored-metric-label">Efficiency ratio</div><div class="' + effCls + '">' + fmtRatio(sp.efficiency_ratio) + "</div></div>" +
        '<div><div class="sponsored-metric-label">Avg fee / link</div><div class="' + avgCls + '">' + (has ? fmtMoney(sp.avg_sponsored_fee) : "—") + "</div></div>" +
        '<div><div class="sponsored-metric-label">Σ Final $</div><div class="sponsored-metric-val">' + (has ? fmtMoney(sp.sum_final_usd) : "—") + "</div></div>" +
        '<div><div class="sponsored-metric-label">Links (priced)</div><div class="sponsored-metric-val">' + fmt(sp.count) + "</div></div>" +
      "</div>" +
    "</div>"
  );
}

function renderInternal(clients) {
  var totPub=0, totBTF=0, totTop=0, totQ=0;
  clients.forEach(function(c) {
    totPub += n(c["Published"]);
    BTF.forEach(function(s) { totBTF += n(c[s]); });
    TOP.forEach(function(s) { totTop += n(c[s]); });
    totQ += n(c["quota"]);
  });
  var op=pct(totPub,totQ), pc=pcClass(op);
  var pipeline=totBTF+totTop, pipOk=pipeline>=totQ, pipPct=pct(pipeline,totQ);

  document.getElementById("summary-internal").innerHTML =
    '<div class="sum-tile"><div class="sum-label">Published total</div><div class="sum-value sv-teal">'+fmt(totPub)+'</div></div>'+
    '<div class="sum-tile"><div class="sum-label">BTF total (published incl.)</div><div class="sum-value sv-teal">'+fmt(totBTF)+'</div></div>'+
    '<div class="sum-tile"><div class="sum-label">Top Funnel total</div><div class="sum-value sv-purple">'+fmt(totTop)+'</div></div>'+
    '<div class="sum-tile"><div class="sum-label">Internal quota</div><div class="sum-value sv-neutral">'+fmt(totQ)+'</div>'+
      '<div class="pipeline-indicator"><div class="pip-dot '+(pipOk?"pip-ok":"pip-warn")+'"></div>Pipeline '+fmt(pipeline)+' - '+pipPct+'% '+(pipOk?"covered":"not yet")+'</div></div>'+
    '<div class="sum-tile"><div class="sum-label">Quota attainment</div><div class="sum-value '+sumClass(pc)+'">'+op+'%</div></div>';

  var grid=document.getElementById("grid-internal");
  grid.innerHTML="";
  clients.forEach(function(c) {
    var quota=n(c["quota"]), pub=n(c["Published"]);
    var btfTotal=BTF.reduce(function(s,k){return s+n(c[k]);},0);
    var topTotal=TOP.reduce(function(s,k){return s+n(c[k]);},0);
    var pipeline=btfTotal+topTotal, pipOk=pipeline>=quota, pipPct=pct(pipeline,quota);
    var p=pct(pub,quota), pc=pcClass(p);

    var btfRows=BTF.map(function(s){
      var v=n(c[s]), isPub=(s==="Published");
      return '<div class="status-row"><span class="s-name'+(isPub?" s-name-pub":"")+'">'+s+'</span><span class="s-val'+(isPub?" s-val-pub":"")+'">'+fmt(v)+'</span></div>';
    }).join("");
    var topRows=TOP.map(function(s){
      return '<div class="status-row"><span class="s-name">'+s+'</span><span class="s-val">'+fmt(n(c[s]))+'</span></div>';
    }).join("");

    var card=document.createElement("div"); card.className="client-card";
    card.innerHTML=
      '<div class="card-header"><div class="client-name">'+esc(c["client"])+'</div><div class="quota-pill">quota <strong>'+fmt(quota)+'</strong></div></div>'+
      '<div class="progress-wrap">'+
        '<div class="progress-labels"><span>Published vs quota</span><span class="progress-pct ppc-'+pc+'">'+p+'%</span></div>'+
        '<div class="progress-track"><div class="progress-fill pf-'+pc+'" style="width:'+Math.min(p,100)+'%"></div></div>'+
        '<div class="pipeline-badge"><div class="pip-dot '+(pipOk?"pip-ok":"pip-warn")+'"></div><div class="pipeline-text">Pipeline <strong>'+fmt(pipeline)+'</strong> ('+pipPct+'% of quota) <span class="pipeline-status '+(pipOk?"covered":"not-covered")+'">'+(pipOk?"✓ Covered":"Not yet covered")+'</span></div></div>'+
      '</div>'+
      '<div class="funnels">'+
        '<div class="funnel-col"><div class="funnel-heading fh-btf"><svg width="6" height="6" viewBox="0 0 6 6"><circle cx="3" cy="3" r="3" fill="var(--teal)"/></svg>Bottom Funnel (published incl.)</div><div class="funnel-total ft-btf">'+fmt(btfTotal)+'</div><div class="status-list">'+btfRows+'</div></div>'+
        '<div class="funnel-col"><div class="funnel-heading fh-top"><svg width="6" height="6" viewBox="0 0 6 6"><circle cx="3" cy="3" r="3" fill="var(--purple)"/></svg>Top Funnel</div><div class="funnel-total ft-top">'+fmt(topTotal)+'</div><div class="status-list">'+topRows+'</div></div>'+
      '</div>';
    card.innerHTML += renderSponsoredStrip(c.sponsored);
    grid.appendChild(card);
  });

  renderSponsoredSummary(globalSponsoredTotals);
}

loadData();
</script>
</body>
</html>
