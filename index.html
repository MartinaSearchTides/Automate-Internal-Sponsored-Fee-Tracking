<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow">
<title>SearchTides - Internal Sponsored Fee Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #f5f4f0;
  --surface:  #ffffff;
  --surface2: #f9f8f5;
  --surface3: #eeecea;
  --border:   rgba(0,0,0,0.08);
  --border2:  rgba(0,0,0,0.14);
  --text:     #1a1916;
  --muted:    #888580;
  --muted2:   #5a5754;
  --purple:       #5b4de0;
  --purple-light: #7c6af5;
  --purple-dim:   rgba(91,77,224,0.08);
  --purple-bdr:   rgba(91,77,224,0.22);
  --teal:       #0e9e80;
  --teal-light: #12b894;
  --teal-dim:   rgba(14,158,128,0.08);
  --teal-bdr:   rgba(14,158,128,0.22);
  --amber:      #c47a1a;
  --amber-dim:  rgba(196,122,26,0.08);
  --amber-bdr:  rgba(196,122,26,0.22);
  --red:    #c0392b;
  --orange: #e07820;
  --green:  #1a8a52;
  --fd: 'Libre Baskerville', serif;
  --fs: 'Inter', sans-serif;
  --fm: 'DM Mono', monospace;
}
body { font-family: var(--fs); background: var(--bg); color: var(--text); min-height: 100vh; font-variant-numeric: tabular-nums; font-size: 14px; }

/* LOADING */
#loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1.5rem; }
.load-wordmark { font-family: var(--fd); font-size: 12px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 12px; }
.load-wordmark::before, .load-wordmark::after { content: ''; display: block; width: 32px; height: 1px; background: var(--border2); }
.load-title { font-family: var(--fd); font-size: 52px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
.load-title em { font-style: italic; color: var(--purple); font-weight: 400; }
.load-status { font-size: 12px; color: var(--muted); font-family: var(--fm); display: flex; align-items: center; gap: 8px; }
.spinner { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: var(--surface); border: 1px solid rgba(192,57,43,0.3); border-radius: 8px; padding: 1.5rem 2rem; max-width: 480px; text-align: center; }
.error-box h3 { font-family: var(--fd); font-size: 18px; color: var(--red); margin-bottom: 0.5rem; }
.error-box p { font-size: 13px; color: var(--muted2); font-family: var(--fm); margin-bottom: 1rem; }
.retry-btn { padding: 8px 20px; background: var(--purple); color: #fff; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; font-family: var(--fs); cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; }

/* DASHBOARD */
#dashboard { display: none; max-width: 1500px; margin: 0 auto; padding: 0 2rem 4rem; }
.dashboard-body { margin-top: 1.75rem; }
.topnav { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 0; border-bottom: 1px solid var(--border2); flex-wrap: wrap; gap: 1rem; }
.nav-brand { font-family: var(--fd); font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.nav-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--purple); }
.nav-brand span { color: var(--muted); font-weight: 400; font-size: 14px; font-family: var(--fs); }
.nav-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
.nav-meta { font-size: 11px; color: var(--muted); font-family: var(--fm); }
.refresh-btn { font-size: 11px; color: var(--muted2); background: var(--surface); border: 1px solid var(--border2); border-radius: 4px; padding: 6px 14px; cursor: pointer; font-family: var(--fm); display: flex; align-items: center; gap: 6px; transition: border-color 0.15s, color 0.15s; }
.refresh-btn:hover { border-color: var(--purple-bdr); color: var(--purple); }
.refresh-btn .spin-sm { width: 10px; height: 10px; border: 1.5px solid var(--border2); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
.refresh-btn.loading .spin-sm { display: block; }

.summary-bar { display: grid; grid-template-columns: repeat(5,1fr); gap: 1px; background: var(--border); border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; margin-bottom: 1.75rem; }
.sum-tile { background: var(--surface); padding: 1.1rem 1.4rem; transition: background 0.15s; }
.sum-tile:hover { background: var(--surface2); }
.sum-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; font-family: var(--fm); }
.sum-value { font-family: var(--fd); font-size: 32px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
.sv-teal    { color: var(--teal); }
.sv-purple  { color: var(--purple); }
.sv-neutral { color: var(--text); }
.sv-ok      { color: var(--green); }
.sv-warn    { color: var(--orange); }
.sv-over    { color: var(--red); }
.sv-amber   { color: var(--amber); }
.pipeline-indicator { margin-top: 6px; font-size: 10px; font-family: var(--fm); color: var(--muted); display: flex; align-items: center; gap: 5px; }
.pip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.pip-ok   { background: var(--green); }
.pip-warn { background: var(--orange); }

.summary-sponsored-wrap { margin-bottom: 1.75rem; }
.summary-sponsored-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; font-family: var(--fm);
  color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.summary-sponsored-title svg { flex-shrink: 0; }
.summary-bar.summary-sponsored { grid-template-columns: repeat(5, 1fr); }
.sponsored-footnote {
  font-size: 11px; color: var(--muted); font-family: var(--fm); margin-top: 10px; line-height: 1.45; max-width: 920px;
}
.sv-dollar { color: var(--text); }
.sum-sub { font-size: 11px; font-family: var(--fm); color: var(--muted); margin-top: 8px; font-weight: 400; letter-spacing: 0; text-transform: none; }

.team-performance-wrap { margin-bottom: 1.75rem; }
.team-perf-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; font-family: var(--fm);
  color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.team-table-scroll { overflow-x: auto; border: 1px solid var(--border2); border-radius: 8px; }
.team-table { width: 100%; border-collapse: collapse; background: var(--surface); font-family: var(--fm); font-size: 13px; }
.team-table thead { background: var(--surface2); }
.team-table th {
  padding: 12px 16px; text-align: left; font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border2); white-space: nowrap;
}
.team-table th:first-child { position: sticky; left: 0; background: var(--surface2); z-index: 2; }
.team-table td {
  padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text);
  font-variant-numeric: tabular-nums; text-align: right; white-space: nowrap;
}
.team-table td:first-child {
  text-align: left; font-weight: 500; position: sticky; left: 0; background: var(--surface); z-index: 1;
  border-right: 1px solid var(--border2);
}
.team-table tbody tr:hover { background: var(--surface2); }
.team-table tbody tr:hover td:first-child { background: var(--surface2); }
.team-table td.zero { color: var(--muted); }

.sponsored-strip { display: grid; grid-template-columns: repeat(2,1fr); gap: 1px; background: var(--border); border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; }

.client-card { background: var(--surface); display: flex; flex-direction: column; }
.client-card:hover { background: var(--surface2); }
.client-card:nth-child(odd)  { border-top: 3px solid var(--purple); }
.client-card:nth-child(even) { border-top: 3px solid var(--teal); }

.card-header { padding: 20px 24px 16px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); }
.client-name { font-family: var(--fd); font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }

.sponsored-metrics-card { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--border); }
.spm-item { background: var(--surface); padding: 18px 22px; transition: background 0.15s; }
.spm-item:hover { background: var(--surface2); }
.spm-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-family: var(--fm); }
.spm-value { font-family: var(--fd); font-size: 28px; font-weight: 700; letter-spacing: -1px; line-height: 1; font-variant-numeric: tabular-nums; color: var(--text); }
.spm-value.spm-ratio { color: var(--purple); }
.spm-value.spm-count { color: var(--teal); }
.spm-value.spm-na { color: var(--muted); font-size: 20px; }
.spm-sub { font-size: 11px; font-family: var(--fm); color: var(--muted); margin-top: 6px; }

@media (max-width: 900px) {
  .clients-grid { grid-template-columns: 1fr; }
  .summary-bar  { grid-template-columns: repeat(2,1fr); }
  .summary-bar.summary-sponsored { grid-template-columns: repeat(2, 1fr); }
  .sponsored-metrics-card { grid-template-columns: 1fr; }
  .team-table th, .team-table td { padding: 10px 12px; font-size: 12px; }
  .team-table th { font-size: 9px; }
}

@media (max-width: 640px) {
  #dashboard { padding: 0 1rem 2rem; }
  .topnav { padding: 0.8rem 0; }
  .nav-brand { font-size: 15px; }
  .nav-brand span { font-size: 12px; }
  .nav-meta { font-size: 10px; }
  .refresh-btn { font-size: 10px; padding: 5px 10px; }
  .summary-bar { grid-template-columns: 1fr; }
  .summary-bar.summary-sponsored { grid-template-columns: 1fr; }
  .sponsored-metrics-card { grid-template-columns: 1fr; }
  .sum-tile { padding: 1rem 1.2rem; }
  .sum-label { font-size: 9px; }
  .sum-value { font-size: 26px; }
  .pipeline-indicator { font-size: 9px; }
  .card-header { padding: 16px 18px 14px; flex-wrap: wrap; gap: 8px; }
  .client-name { font-size: 19px; }
  .spm-item { padding: 14px 18px; }
  .spm-label { font-size: 9px; }
  .spm-value { font-size: 22px; }
  .spm-sub { font-size: 10px; }
  .team-table th, .team-table td { padding: 8px 10px; font-size: 11px; }
  .team-table th { font-size: 8px; }
  .load-title { font-size: 36px; text-align: center; }
  .load-wordmark { font-size: 11px; }
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="load-wordmark">SearchTides</div>
  <h1 class="load-title">INTERNAL SPONSORED <em>FEE</em></h1>
  <div class="load-status" id="load-status">
    <div class="spinner"></div>
    <span id="load-text">Loading data...</span>
  </div>
</div>

<div id="dashboard">
  <div class="topnav">
    <div class="nav-brand"><div class="nav-dot"></div>SearchTides<span>/ INTERNAL SPONSORED FEE DASHBOARD</span></div>
    <div class="nav-right">
      <span class="nav-meta" id="nav-meta"></span>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
        <div class="spin-sm"></div>
        Refresh
      </button>
    </div>
  </div>
  <div class="dashboard-body">
    <div class="summary-sponsored-wrap">
      <div class="summary-sponsored-title">
        <svg width="6" height="6" viewBox="0 0 6 6"><circle cx="3" cy="3" r="3" fill="var(--teal)"/></svg>
        Internal sponsored fees — all clients
      </div>
      <div class="summary-bar summary-sponsored" id="summary-sponsored-internal"></div>
      <p class="sponsored-footnote" id="sponsored-footnote-internal"></p>
    </div>
    <div class="team-performance-wrap">
      <div class="team-perf-title">
        <svg width="6" height="6" viewBox="0 0 6 6"><circle cx="3" cy="3" r="3" fill="var(--purple)"/></svg>
        Team performance — published link count (2026)
      </div>
      <div class="team-table-scroll">
        <table class="team-table" id="team-table-count"></table>
      </div>
    </div>
    <div class="team-performance-wrap">
      <div class="team-perf-title">
        <svg width="6" height="6" viewBox="0 0 6 6"><circle cx="3" cy="3" r="3" fill="var(--teal)"/></svg>
        Team performance — published link value (2026)
      </div>
      <div class="team-table-scroll">
        <table class="team-table" id="team-table-lv"></table>
      </div>
    </div>
    <div class="team-performance-wrap">
      <div class="team-perf-title">
        <svg width="6" height="6" viewBox="0 0 6 6"><circle cx="3" cy="3" r="3" fill="var(--amber)"/></svg>
        Team performance — total cost of published links (2026)
      </div>
      <div class="team-table-scroll">
        <table class="team-table" id="team-table-cost"></table>
      </div>
    </div>
    <div class="clients-grid" id="grid-internal"></div>
  </div>
</div>

<script>
var globalClients = [];
var globalSponsoredTotals = null;
var globalTeamPerf = null;

function n(v) { var x = parseFloat(v); return isNaN(x) ? 0 : x; }
function fmt(v) { return Math.round(v||0).toLocaleString("en-US"); }
function fmtMoney(v) {
  if (v === null || v === undefined) return "—";
  var x = Number(v);
  if (isNaN(x)) return "—";
  return x.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
}
function fmtRatio(v) {
  if (v === null || v === undefined || isNaN(v)) return "—";
  return Number(v).toFixed(4);
}
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

async function loadData() {
  var btn = document.getElementById("refresh-btn");
  var loadScreen = document.getElementById("loading-screen");
  var dash = document.getElementById("dashboard");

  btn.classList.add("loading");
  document.getElementById("load-text").textContent = "Loading data...";

  try {
    var res = await fetch("/api/data?t=" + Date.now(), { cache: "no-store" });
    var raw = await res.text();
    var json = null;
    try {
      json = raw ? JSON.parse(raw) : null;
    } catch (parseErr) {
      json = null;
    }
    if (!res.ok) {
      var errMsg =
        json && json.error
          ? json.error
          : raw
            ? ("HTTP " + res.status + " — " + raw.slice(0, 400).replace(/\s+/g, " ").trim())
            : ("HTTP " + res.status + " (empty body)");
      throw new Error(errMsg);
    }
    if (!json) throw new Error("Invalid JSON from API");
    if (!json.ok) throw new Error(json.error || "Unknown error");

    globalClients = json.clients;
    globalSponsoredTotals = json.sponsored_totals || null;
    globalTeamPerf = json.team_performance || null;
    var loaded = new Date(json.generated).toLocaleTimeString("en-US");
    document.getElementById("nav-meta").textContent = json.clients.length + " clients - " + json.prod_month + " - loaded " + loaded;

    renderInternal(json.clients);
    renderTeamPerformance(globalTeamPerf, "team-table-count", "link_counts", false);
    renderTeamPerformance(globalTeamPerf, "team-table-lv", "link_values", true);
    renderTeamPerformance(globalTeamPerf, "team-table-cost", "total_costs", "money");

    loadScreen.style.display = "none";
    dash.style.display = "block";

  } catch(err) {
    document.getElementById("load-text").textContent = "Error: " + err.message;
    loadScreen.innerHTML =
      '<div class="load-wordmark">SearchTides</div>' +
      '<h1 class="load-title">INTERNAL SPONSORED <em>FEE</em></h1>' +
      '<div class="error-box">' +
        '<h3>Could not load data</h3>' +
        '<p>' + esc(err.message) + '</p>' +
        '<button class="retry-btn" onclick="loadData()">Retry</button>' +
      '</div>';
  } finally {
    btn.classList.remove("loading");
  }
}

function renderSponsoredSummary(totals) {
  var el = document.getElementById("summary-sponsored-internal");
  var foot = document.getElementById("sponsored-footnote-internal");
  if (!totals || !el) return;
  var eff = totals.efficiency_ratio;
  var avg = totals.avg_sponsored_fee;
  el.innerHTML =
    '<div class="sum-tile"><div class="sum-label">Cost per LV</div><div class="sum-value sv-purple">' + fmtRatio(eff) +
    '</div><div class="sum-sub">Σ Final $ ÷ Σ LV</div></div>' +
    '<div class="sum-tile"><div class="sum-label">Avg cost per link</div><div class="sum-value sv-dollar">' + fmtMoney(avg) +
    '</div><div class="sum-sub">Σ Final $ ÷ count</div></div>' +
    '<div class="sum-tile"><div class="sum-label">Links (priced)</div><div class="sum-value sv-teal">' + fmt(totals.count) +
    '</div><div class="sum-sub">BOF with FINAL $ filled</div></div>' +
    '<div class="sum-tile"><div class="sum-label">Σ Final $</div><div class="sum-value sv-dollar">' + fmtMoney(totals.sum_final_usd) +
    '</div><div class="sum-sub">Total cost, all clients</div></div>' +
    '<div class="sum-tile"><div class="sum-label">Σ LV</div><div class="sum-value sv-teal">' + fmt(totals.sum_lv) +
    '</div><div class="sum-sub">Total value (priced only)</div></div>';
  if (foot) {
    foot.textContent =
      "Bottom-of-funnel (BOF) rows with filled FINAL $ only. FINAL $ may be $0 (free placement). Data: HSS SeaTable OM.";
  }
}

function renderInternal(clients) {
  var grid = document.getElementById("grid-internal");
  grid.innerHTML = "";
  
  clients.forEach(function(c) {
    var sp = c.sponsored || { sum_lv: 0, sum_final_usd: 0, count: 0, efficiency_ratio: null, avg_sponsored_fee: null };
    var has = sp.count > 0;
    
    var card = document.createElement("div");
    card.className = "client-card";
    card.innerHTML =
      '<div class="card-header"><div class="client-name">' + esc(c.client) + '</div></div>' +
      '<div class="sponsored-metrics-card">' +
        '<div class="spm-item"><div class="spm-label">Cost per LV</div><div class="spm-value ' + (has ? "spm-ratio" : "spm-na") + '">' + (has ? fmtRatio(sp.efficiency_ratio) : "—") + '</div><div class="spm-sub">Σ Final $ ÷ Σ LV</div></div>' +
        '<div class="spm-item"><div class="spm-label">Avg cost per link</div><div class="spm-value ' + (has ? "" : "spm-na") + '">' + (has ? fmtMoney(sp.avg_sponsored_fee) : "—") + '</div><div class="spm-sub">Σ Final $ ÷ count</div></div>' +
        '<div class="spm-item"><div class="spm-label">Σ Final $</div><div class="spm-value">' + (has ? fmtMoney(sp.sum_final_usd) : "—") + '</div><div class="spm-sub">Total cost</div></div>' +
        '<div class="spm-item"><div class="spm-label">Links (priced)</div><div class="spm-value spm-count">' + fmt(sp.count) + '</div><div class="spm-sub">BOF with FINAL $</div></div>' +
      '</div>';
    grid.appendChild(card);
  });

  renderSponsoredSummary(globalSponsoredTotals);
}

function renderTeamPerformance(perf, tableId, dataKey, formatType) {
  var table = document.getElementById(tableId);
  if (!perf || !table || !perf.members || perf.members.length === 0) {
    if (table) table.innerHTML = '<tbody><tr><td style="padding:20px;text-align:center;color:var(--muted);">No team data</td></tr></tbody>';
    return;
  }
  
  var months = perf.months || [];
  var members = perf.members || [];
  var data = perf[dataKey] || {};
  
  var thead = '<thead><tr><th>Team member</th>';
  months.forEach(function(m) {
    thead += '<th>' + esc(m) + '</th>';
  });
  thead += '</tr></thead>';
  
  var tbody = '<tbody>';
  members.forEach(function(member) {
    tbody += '<tr><td>' + esc(member) + '</td>';
    months.forEach(function(m) {
      var val = (data[member] && data[member][m]) ? data[member][m] : 0;
      var cls = val === 0 ? ' class="zero"' : '';
      var display;
      if (val === 0) {
        display = '—';
      } else if (formatType === "money") {
        display = fmtMoney(val);
      } else if (formatType === true) {
        display = fmt(Math.round(val));
      } else {
        display = val;
      }
      tbody += '<td' + cls + '>' + display + '</td>';
    });
    tbody += '</tr>';
  });
  tbody += '</tbody>';
  
  table.innerHTML = thead + tbody;
}

loadData();
</script>
</body>
</html>
